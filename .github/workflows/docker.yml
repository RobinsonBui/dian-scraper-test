name: Build & push Docker image to GHCR

# When to build:
#   - every push to main: tags `:main` (rolling latest, for previews)
#   - every push of an annotated git tag (e.g. v1.61.0): tags the matching
#     image (`v1.61.0`) AND moves `:latest` to it
#
# What it produces:
#   ghcr.io/<owner>/dian-scraper-test:<git-tag>
#   ghcr.io/<owner>/dian-scraper-test:latest   (on tagged builds)
#   ghcr.io/<owner>/dian-scraper-test:main     (on main pushes)
#
# Auth: GHCR uses the workflow's GITHUB_TOKEN with packages:write — no PAT
# needed. The package is automatically created under the repo owner on the
# first push.

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Lowercased automatically by docker/metadata-action; keeping the path
  # literal so the deploy in Dokploy resolves to ghcr.io/robinsonbui/...
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache via GHA so reruns don't redo the playwright base pull
          cache-from: type=gha
          cache-to: type=gha,mode=max
