<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DIAN Scraper Test</title>
  <style>
    :root {
      --bg: #0b0f17;
      --bg-2: #131927;
      --bg-3: #1b2235;
      --border: #2a3245;
      --text: #e6edf7;
      --text-dim: #8b96ac;
      --accent: #4f7cff;
      --accent-2: #6c9bff;
      --ok: #34d399;
      --warn: #fbbf24;
      --fail: #f87171;
      --block: #fb7185;
      --info: #60a5fa;
      --mono: ui-monospace, "JetBrains Mono", "Fira Code", "SF Mono", Menlo,
        Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body {
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      font-size: 13px;
    }

    .app {
      display: grid;
      grid-template-columns: 340px 1fr 1fr;
      grid-template-rows: 48px 1fr;
      height: 100vh;
    }

    /* Header */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header h1 .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background .2s;
    }
    header.is-running h1 .dot {
      background: var(--ok);
      box-shadow: 0 0 8px var(--ok);
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .stats {
      display: flex;
      gap: 18px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .stats .stat strong {
      color: var(--text);
      margin-left: 4px;
    }
    .stats .stat.ok strong { color: var(--ok); }
    .stats .stat.fail strong { color: var(--fail); }
    .stats .stat.block strong { color: var(--block); }

    /* Panels */
    .panel {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }
    .panel:last-child { border-right: none; }
    .panel-head {
      padding: 12px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-body {
      flex: 1;
      overflow: auto;
      padding: 14px;
    }

    /* Form (left panel) */
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 8px 10px;
      background: var(--bg-3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.5;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .form-row.three { grid-template-columns: 1fr 1fr 1fr; }

    .btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: var(--accent-2); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn.secondary:hover { background: var(--bg-3); }
    .btn.danger { background: var(--fail); }
    .btn.danger:hover { background: #ef4444; }

    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
      padding: 4px 0;
    }
    .checkbox-group input { width: auto; }

    /* Invoice list (middle panel) */
    .invoice-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .invoice-item {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-left: 3px solid var(--text-dim);
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .invoice-item:hover {
      background: #232d44;
    }
    .invoice-item.selected {
      border-color: var(--accent);
      background: #1e2841;
    }
    .invoice-item.ok { border-left-color: var(--ok); }
    .invoice-item.fail { border-left-color: var(--fail); }
    .invoice-item.block { border-left-color: var(--block); }

    .invoice-item .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .invoice-item .prefijo {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }
    .invoice-item .seq {
      color: var(--text-dim);
      font-size: 10px;
      font-family: var(--mono);
    }
    .invoice-item .meta {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .invoice-item .meta .pill {
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--bg-2);
      font-family: var(--mono);
      font-size: 10px;
    }
    .invoice-item.ok .meta .status-pill { color: var(--ok); }
    .invoice-item.fail .meta .status-pill { color: var(--fail); }
    .invoice-item.block .meta .status-pill { color: var(--block); }
    .invoice-item .cufe {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
      word-break: break-all;
    }

    /* Log (middle panel bottom) */
    .log-area {
      max-height: 35%;
      background: var(--bg);
      border-top: 1px solid var(--border);
      overflow: auto;
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 10px;
      line-height: 1.6;
    }
    .log-line { color: var(--text-dim); }
    .log-line .ts { color: #525c75; }
    .log-line.ok { color: var(--ok); }
    .log-line.fail { color: var(--fail); }
    .log-line.block { color: var(--block); }
    .log-line.info { color: var(--info); }
    .log-line.sleep { color: var(--warn); }

    /* Preview (right panel) */
    .preview-tabs {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      color: var(--text-dim);
      background: transparent;
      border: none;
      font-family: inherit;
    }
    .tab.active {
      color: var(--text);
      background: var(--bg-3);
    }
    .tab:disabled { opacity: 0.4; cursor: not-allowed; }

    .preview-body {
      flex: 1;
      overflow: auto;
      background: var(--bg);
    }
    .preview-body iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }
    .preview-body pre {
      margin: 0;
      padding: 14px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .preview-body .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: 12px;
      text-align: center;
      padding: 20px;
    }

    .preview-meta {
      padding: 10px 14px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 12px;
      font-size: 11px;
    }
    .preview-meta dt { color: var(--text-dim); }
    .preview-meta dd { margin: 0; font-family: var(--mono); word-break: break-all; }
    .preview-meta dd a { color: var(--accent-2); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a4560; }

    .empty-list {
      color: var(--text-dim);
      text-align: center;
      padding: 30px 14px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header id="header">
      <h1>
        <span class="dot"></span>
        DIAN Scraper Test
      </h1>
      <div class="stats" id="stats">
        <span class="stat">Total <strong id="stat-total">0</strong></span>
        <span class="stat ok">OK <strong id="stat-ok">0</strong></span>
        <span class="stat fail">Fail <strong id="stat-fail">0</strong></span>
        <span class="stat block">Block <strong id="stat-block">0</strong></span>
        <span class="stat">Avg <strong id="stat-avg">—</strong></span>
      </div>
    </header>

    <!-- LEFT: Form -->
    <section class="panel">
      <div class="panel-head">Configuración</div>
      <div class="panel-body">
        <div class="form-group">
          <label for="authUrl">Auth URL (del mail DIAN)</label>
          <textarea id="authUrl" placeholder="https://catalogo-vpfe.dian.gov.co/User/AuthToken?pk=..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="startDate">Fecha inicio</label>
            <input id="startDate" type="date" />
          </div>
          <div class="form-group">
            <label for="endDate">Fecha fin</label>
            <input id="endDate" type="date" />
          </div>
        </div>

        <div class="form-group">
          <label for="maxInvoices">Máx facturas</label>
          <input id="maxInvoices" type="number" value="30" min="1" max="500" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="delayMin">Delay min (ms)</label>
            <input id="delayMin" type="number" value="5000" min="0" />
          </div>
          <div class="form-group">
            <label for="delayMax">Delay max (ms)</label>
            <input id="delayMax" type="number" value="13000" min="0" />
          </div>
        </div>

        <div class="form-group">
          <label for="longPause">Pausa larga cada N (0 = nunca)</label>
          <input id="longPause" type="number" value="30" min="0" />
        </div>

        <div class="checkbox-group">
          <input id="headless" type="checkbox" checked />
          <label for="headless" style="margin: 0; text-transform: none; letter-spacing: 0;">Headless (oculto)</label>
        </div>

        <div style="margin-top: 16px;" class="btn-row">
          <button id="btnStart" class="btn">Iniciar</button>
          <button id="btnCancel" class="btn danger" disabled>Cancelar</button>
        </div>
        <button id="btnClear" class="btn secondary" style="margin-top: 8px;">Limpiar lista</button>
      </div>
    </section>

    <!-- MIDDLE: Invoices + Log -->
    <section class="panel">
      <div class="panel-head">
        <span>Facturas descargadas</span>
        <span id="invoiceCount" style="font-family: var(--mono); color: var(--text-dim);">0</span>
      </div>
      <div class="panel-body" id="invoiceListContainer">
        <div class="invoice-list" id="invoiceList"></div>
        <div class="empty-list" id="emptyList">
          Cuando se descargue una factura, aparecerá acá.
        </div>
      </div>
      <div class="log-area" id="logArea"></div>
    </section>

    <!-- RIGHT: Preview -->
    <section class="panel">
      <div class="panel-head">Vista previa</div>
      <dl class="preview-meta" id="previewMeta" style="display:none">
        <dt>Prefijo/Folio</dt><dd id="meta-prefijo">—</dd>
        <dt>CUFE</dt><dd id="meta-cufe">—</dd>
        <dt>NIT emisor</dt><dd id="meta-nit">—</dd>
        <dt>Fecha</dt><dd id="meta-date">—</dd>
        <dt>Tamaño</dt><dd id="meta-size">—</dd>
        <dt>Archivos</dt><dd id="meta-files">—</dd>
      </dl>
      <div class="preview-tabs">
        <button class="tab active" data-tab="pdf">PDF</button>
        <button class="tab" data-tab="xml">XML</button>
        <button class="tab" data-tab="raw">Detalle</button>
      </div>
      <div class="preview-body" id="previewBody">
        <div class="empty">
          Seleccioná una factura de la lista del centro para ver su PDF y XML.
        </div>
      </div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // Default dates: previous month
    (() => {
      const now = new Date();
      const firstOfMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const lastOfMonth = new Date(now.getFullYear(), now.getMonth(), 0);
      $('startDate').value = firstOfMonth.toISOString().slice(0, 10);
      $('endDate').value = lastOfMonth.toISOString().slice(0, 10);
    })();

    const state = {
      invoices: new Map(), // cufe -> event
      selected: null,
      stats: { total: 0, ok: 0, fail: 0, block: 0, latencies: [] },
      currentTab: 'pdf',
      // job_id of the run we kicked off most recently. Needed by
      // POST /api/cancel which now requires {"job_id": "..."} because
      // the server supports concurrent jobs and there is no longer
      // a single "current" run to target globally.
      currentJobId: null,
    };

    function updateStats() {
      $('stat-total').textContent = state.stats.total;
      $('stat-ok').textContent = state.stats.ok;
      $('stat-fail').textContent = state.stats.fail;
      $('stat-block').textContent = state.stats.block;
      const lats = state.stats.latencies;
      if (lats.length > 0) {
        const avg = Math.round(lats.reduce((a, b) => a + b, 0) / lats.length);
        $('stat-avg').textContent = `${avg}ms`;
      }
    }

    function appendLog(event) {
      const log = $('logArea');
      const line = document.createElement('div');
      const cls = event.status || 'info';
      line.className = `log-line ${event.phase === 'sleep' ? 'sleep' : cls}`;
      const ts = (event.timestamp || '').slice(11, 19);
      const seq = event.sequence ? `#${event.sequence}` : '';
      const prefijo = event.prefijo_folio ? event.prefijo_folio : '';
      const code = event.http_status ? `HTTP ${event.http_status}` : '';
      const ms = event.elapsed_ms ? `${event.elapsed_ms}ms` : '';
      const note = event.notes || event.error || '';
      const phaseLabel = event.phase ? `[${event.phase}]` : '';
      line.innerHTML = `<span class="ts">${ts}</span> ${phaseLabel} ${seq} ${prefijo} ${code} ${ms} <span style="opacity:.7">${escapeHtml(note)}</span>`;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function addOrUpdateInvoice(event) {
      if (event.phase !== 'download') return;
      const key = event.cufe || `seq-${event.sequence}`;
      const existing = state.invoices.get(key);
      const merged = Object.assign({}, existing || {}, event);
      state.invoices.set(key, merged);

      // Stats
      if (!existing) {
        state.stats.total += 1;
        if (event.status === 'ok') state.stats.ok += 1;
        else if (event.status === 'block') state.stats.block += 1;
        else state.stats.fail += 1;
        if (event.elapsed_ms) state.stats.latencies.push(event.elapsed_ms);
      }
      updateStats();

      renderInvoice(merged);
    }

    function renderInvoice(event) {
      const key = event.cufe || `seq-${event.sequence}`;
      const list = $('invoiceList');
      let item = document.querySelector(`[data-key="${CSS.escape(key)}"]`);
      const cls = event.status === 'ok' ? 'ok'
        : event.status === 'block' ? 'block'
        : 'fail';

      const statusLabel = event.status === 'ok' ? '✓ OK'
        : event.status === 'block' ? '🚫 BLOCK'
        : '✗ FAIL';

      const sizeKb = event.bytes_downloaded
        ? `${(event.bytes_downloaded / 1024).toFixed(1)} KB`
        : '';
      const ms = event.elapsed_ms ? `${event.elapsed_ms}ms` : '';
      const code = event.http_status ? `HTTP ${event.http_status}` : '';

      const html = `
        <div class="top">
          <div class="prefijo">${escapeHtml(event.prefijo_folio || '—')}</div>
          <div class="seq">#${event.sequence}</div>
        </div>
        <div class="meta">
          <span class="pill status-pill">${statusLabel}</span>
          ${code ? `<span class="pill">${code}</span>` : ''}
          ${ms ? `<span class="pill">${ms}</span>` : ''}
          ${sizeKb ? `<span class="pill">${sizeKb}</span>` : ''}
          ${event.issuer_nit ? `<span class="pill">NIT ${escapeHtml(event.issuer_nit)}</span>` : ''}
        </div>
        <div class="cufe">${escapeHtml(event.cufe || '')}</div>
      `;

      if (item) {
        item.className = `invoice-item ${cls}` + (state.selected === key ? ' selected' : '');
        item.innerHTML = html;
      } else {
        item = document.createElement('div');
        item.className = `invoice-item ${cls}`;
        item.dataset.key = key;
        item.innerHTML = html;
        item.addEventListener('click', () => selectInvoice(key));
        list.appendChild(item);
      }
      $('invoiceCount').textContent = state.invoices.size;
      $('emptyList').style.display = state.invoices.size > 0 ? 'none' : 'block';
    }

    function selectInvoice(key) {
      state.selected = key;
      document.querySelectorAll('.invoice-item').forEach(el => el.classList.remove('selected'));
      const el = document.querySelector(`[data-key="${CSS.escape(key)}"]`);
      if (el) el.classList.add('selected');
      const event = state.invoices.get(key);
      if (!event) return;
      renderPreview(event);
    }

    function renderPreview(event) {
      $('previewMeta').style.display = 'grid';
      $('meta-prefijo').textContent = event.prefijo_folio || '—';
      $('meta-cufe').textContent = event.cufe || '—';
      $('meta-nit').textContent = event.issuer_nit || '—';
      $('meta-date').textContent = event.issue_date || '—';
      const sizeKb = event.bytes_downloaded
        ? `${(event.bytes_downloaded / 1024).toFixed(1)} KB`
        : '—';
      $('meta-size').textContent = sizeKb;
      const files = [];
      if (event.pdf_filename) files.push(`<a href="/files/${encodeURIComponent(event.pdf_filename)}" target="_blank">${event.pdf_filename}</a>`);
      if (event.xml_filename) files.push(`<a href="/files/${encodeURIComponent(event.xml_filename)}" target="_blank">${event.xml_filename}</a>`);
      $('meta-files').innerHTML = files.length ? files.join(' · ') : '—';

      renderTabContent(state.currentTab, event);
    }

    function renderTabContent(tab, event) {
      const body = $('previewBody');
      if (tab === 'pdf') {
        if (event.pdf_filename) {
          body.innerHTML = `<iframe src="/files/${encodeURIComponent(event.pdf_filename)}#toolbar=0"></iframe>`;
        } else {
          body.innerHTML = `<div class="empty">No hay PDF disponible para esta factura.<br/><br/>${event.error ? '<strong>Error:</strong> ' + escapeHtml(event.error) : ''}</div>`;
        }
      } else if (tab === 'xml') {
        if (event.xml_preview) {
          const pretty = formatXml(event.xml_preview);
          body.innerHTML = `<pre>${escapeHtml(pretty)}</pre>`;
        } else if (event.xml_filename) {
          body.innerHTML = `<div class="empty">XML guardado pero preview no disponible.<br/><a href="/files/${encodeURIComponent(event.xml_filename)}" target="_blank">Descargar XML</a></div>`;
        } else {
          body.innerHTML = `<div class="empty">No hay XML disponible.</div>`;
        }
      } else {
        // raw / detalle
        const safe = { ...event };
        body.innerHTML = `<pre>${escapeHtml(JSON.stringify(safe, null, 2))}</pre>`;
      }
    }

    function formatXml(xml) {
      // Lightweight indent — good enough for preview.
      let formatted = '';
      let pad = 0;
      xml.replace(/>\s*</g, '>\n<').split('\n').forEach((node) => {
        let indent = 0;
        if (node.match(/^<\/\w/)) pad = Math.max(pad - 1, 0);
        else if (node.match(/^<\w[^>]*[^\/]>.*$/) && !node.match(/^<\w[^>]*\/>/)) indent = 1;
        formatted += '  '.repeat(pad) + node + '\n';
        pad += indent;
      });
      return formatted.trim();
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        state.currentTab = tab.dataset.tab;
        if (state.selected) {
          renderTabContent(state.currentTab, state.invoices.get(state.selected));
        }
      });
    });

    function setRunning(running) {
      $('header').classList.toggle('is-running', running);
      $('btnStart').disabled = running;
      $('btnCancel').disabled = !running;
    }

    $('btnStart').addEventListener('click', async () => {
      const payload = {
        auth_url: $('authUrl').value.trim(),
        start_date: $('startDate').value,
        end_date: $('endDate').value,
        max_invoices: parseInt($('maxInvoices').value, 10),
        delay_min_ms: parseInt($('delayMin').value, 10),
        delay_max_ms: parseInt($('delayMax').value, 10),
        long_pause_every: parseInt($('longPause').value, 10),
        headless: $('headless').checked,
      };
      if (!payload.auth_url) {
        alert('Pegá la auth URL primero.');
        return;
      }
      try {
        const resp = await fetch('/api/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) {
          const err = await resp.json();
          alert('Error: ' + (err.detail || resp.statusText));
          return;
        }
        // Capture the job_id the server assigned so the cancel
        // button can target this specific run. With concurrent jobs
        // the server no longer cancels "the current run" globally.
        const body = await resp.json();
        state.currentJobId = body.job_id || null;
        setRunning(true);
      } catch (e) {
        alert('Error: ' + e.message);
      }
    });

    $('btnCancel').addEventListener('click', async () => {
      if (!state.currentJobId) {
        alert('Iniciá un run primero — no hay nada para cancelar.');
        return;
      }
      await fetch('/api/cancel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ job_id: state.currentJobId }),
      });
    });

    $('btnClear').addEventListener('click', () => {
      state.invoices.clear();
      state.selected = null;
      state.stats = { total: 0, ok: 0, fail: 0, block: 0, latencies: [] };
      $('invoiceList').innerHTML = '';
      $('invoiceCount').textContent = '0';
      $('emptyList').style.display = 'block';
      $('logArea').innerHTML = '';
      $('previewMeta').style.display = 'none';
      $('previewBody').innerHTML = `<div class="empty">Seleccioná una factura de la lista del centro para ver su PDF y XML.</div>`;
      updateStats();
    });

    // WebSocket
    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/ws`);
      ws.addEventListener('message', (e) => {
        try {
          const msg = JSON.parse(e.data);
          handleMessage(msg);
        } catch {}
      });
      ws.addEventListener('close', () => {
        setTimeout(connectWs, 1500);
      });
    }

    function handleMessage(msg) {
      if (msg.type === 'event') {
        appendLog(msg.payload);
        addOrUpdateInvoice(msg.payload);
      } else if (msg.type === 'status') {
        setRunning(!!msg.payload.running);
      } else if (msg.type === 'summary') {
        appendLog({
          phase: 'summary',
          status: 'info',
          timestamp: new Date().toISOString(),
          notes: `SUMMARY total=${msg.payload.total} ok=${msg.payload.ok} fail=${msg.payload.fail} block=${msg.payload.blocks} avg=${msg.payload.avg_latency_ms}ms p95=${msg.payload.p95_latency_ms}ms`,
        });
      } else if (msg.type === 'error') {
        appendLog({
          phase: 'error',
          status: 'fail',
          timestamp: new Date().toISOString(),
          notes: msg.payload.error,
        });
      } else if (!msg.type && msg.phase) {
        // Buffered events sent without wrapping
        appendLog(msg);
        addOrUpdateInvoice(msg);
      }
    }

    connectWs();
  </script>
</body>
</html>
