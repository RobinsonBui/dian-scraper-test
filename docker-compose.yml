# docker-compose.yml — for Dokploy "Compose" deploy from git
#
# Dokploy clones this repo on every deploy and builds the image
# locally from the Dockerfile. No GHCR / no registry push step
# required; every commit on `main` becomes a fresh build.
#
# Configure on Dokploy side:
#   Provider:     GitHub
#   Repository:   RobinsonBui/dian-scraper-test
#   Branch:       main
#   Build path:   .
#   Compose file: docker-compose.yml
#   Watch paths:  (leave empty — rebuild on every push)
#
# Volumes for downloads/ and logs/ are preserved across deploys so
# we keep evidence between runs.

services:
  dian-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dian-scraper-test
    restart: unless-stopped
    ports:
      # Host:Container — Dokploy/Traefik can also route via labels,
      # but a direct port mapping makes ad-hoc testing easier.
      - "8765:8765"
    volumes:
      - dian-downloads:/app/downloads
      - dian-logs:/app/logs
    environment:
      - TZ=America/Bogota
      # REQUIRED in any deploy that's reachable from outside localhost.
      # See M2M.md for the auth model. Generate the secret once with:
      #   python -c "import secrets; print(secrets.token_urlsafe(48))"
      # and set the SAME value as DIAN_SCRAPER_ALT_API_KEY in nuvara apps/api.
      - SCRAPER_API_KEY=${SCRAPER_API_KEY:-}
      # Optional: route browser+API traffic through a proxy with Colombian
      # exit node. Set this in Dokploy → Environment when the server lives
      # outside CO and DIAN responds slow.
      # Format: http://user:pass@host:port (URL-encode special chars in pass).
      - PROXY_URL=${PROXY_URL:-}
    # Dokploy healthcheck consumes the unauthenticated /healthz so the
    # platform can verify liveness without exposing the API key.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8765/healthz', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  dian-downloads:
  dian-logs:
